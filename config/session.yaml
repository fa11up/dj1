# AutoDJ Session Config
# Edit this file before each run to shape your mix

# ── Paths ─────────────────────────────────────
paths:
  music_dir: "~/Downloads/vibe1ondo"   # Path to your local music folder
  data_dir: "./data"            # Where pipeline JSON files are written
  output_dir: "./output"        # Where the final mix is saved

# ── Spotify Seed (optional) ───────────────────
spotify:
  enabled: true             
  playlist_ids: ["5ymOSXic3iuFBhcN4VaLor"]
  match_threshold: 55

# ── Session Shape ─────────────────────────────
session:
  mode: "creative"        # sequential | creative
  duration_minutes: 30     # total mix length in minutes
  energy_curve: "peak_valley"      # flat | ramp_up | peak_valley | festival
  mood_prompt: "make up something futuristic"               # e.g. "late night, melancholic, driving"

# ── DJ Behavior ───────────────────────────────
dj:
  chaos_factor: 1             # 0.0 = safe, 1.0 = wild
  random_seed: 53            # Set an integer for reproducible runs
  harmonic_strict: true
  bpm_normalize: true
  tempo_tolerance_bpm: 8
  transition_style: "mixed"     # blends | cuts | mixed

# ── DJ Brain ──────────────────────────────────
# provider: anthropic      → requires ANTHROPIC_API_KEY in .env
# provider: openai_compatible → requires base_url + BRAIN_API_KEY (or "ollama"/"none")
brain:
  enabled: true            # true = AI brain plans the setlist
  provider: anthropic       # anthropic | openai_compatible
  model: ""                 # override model; blank = provider default (claude-haiku-4-5 / must set for local)
  base_url: ""              # openai_compatible only, e.g. http://localhost:11434/v1

# ── Output ────────────────────────────────────
output:
  format: "mp3"                 # wav | mp3
  bitrate: "320k"

# ── ID3 Tags (MP3 metadata) ───────────────────
# Title and tracklist are auto-generated; fill in the rest.
id3:
  artist:   "me"
  album:    "dj1"
  composer: "dj1"
  genre:    "Electronic"
  artwork:  "~/Downloads/IMG_0483.JPG"                  # path to cover art (jpg/png)